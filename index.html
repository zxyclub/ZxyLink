<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div class="header-right">
                    <img id="avatar" src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="avatar" class="header-avatar">
                    <a href="admin.html" class="admin-link">管理</a>
                    <a href="private.html" class="admin-link">私密</a>
                </div>
            </div>
            <h1>🔗 收藏夹</h1>
            <nav class="category-nav" id="categoryNav">
                <button class="category-btn active" data-group="all">全部</button>
            </nav>
        </header>

        <main class="links-grid" id="linksGrid">
            <div class="loading">加载中...</div>
        </main>

        <footer>
            <p>使用 <a href="https://gist.github.com" target="_blank">GitHub Gist</a> 数据托管</p>
        </footer>
    </div>

    <script>
        const GIST_ID = 'd12a422a770678dcbb46b8f8050ad2c6';
        const DEFAULT_AVATAR = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0NSIgZmlsbD0iIzMzMyIgc3Ryb2tlPSIjNjY2IiBzdHJva2Utd2lkdGg9IjIiLz48dGV4dCB4PSI1MCIgeT0iNTUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiM5OTkiIGZvbnQtc2l6ZT0iNDAiIGZvbnQtZmFtaWx5PSJBcmlhbCI+PC90ZXh0Pjwvc3ZnPg==';
        let allLinks = [];
        let currentGroup = 'all';
        let globalAvatar = null;

        async function loadLinks() {
            const container = document.getElementById('linksGrid');

            try {
                const response = await fetch(`https://gist.githubusercontent.com/zxyclub/${GIST_ID}/raw/zxylinks.json?t=${Date.now()}`);

                if (!response.ok) {
                    throw new Error('获取数据失败');
                }

                const data = await response.json();

                // 支持新的对象格式 {avatar, links} 和旧的数组格式
                if (Array.isArray(data)) {
                    allLinks = data;
                    globalAvatar = null;
                } else {
                    allLinks = data.links || [];
                    globalAvatar = data.avatar || null;
                }

                // 设置头像
                if (globalAvatar) {
                    document.getElementById('avatar').src = globalAvatar;
                } else {
                    document.getElementById('avatar').src = DEFAULT_AVATAR;
                }

                if (allLinks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>📝 暂无链接</p>
                            <a href="admin.html" class="setup-btn">添加链接</a>
                        </div>
                    `;
                    return;
                }

                renderCategories();
                renderLinks();
            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="empty-state">
                        <p>❌ 加载失败</p>
                        <span class="error-hint">请检查网络连接</span>
                    </div>
                `;
            }
        }

        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            const groups = [...new Set(allLinks.map(link => link.group).filter(Boolean))];
            
            let html = '<button class="category-btn active" data-group="all">全部</button>';
            groups.forEach(group => {
                const isActive = group === currentGroup ? 'active' : '';
                html += `<button class="category-btn ${isActive}" data-group="${group}">${group}</button>`;
            });
            nav.innerHTML = html;

            nav.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentGroup = btn.dataset.group;
                    renderLinks();
                });
            });
        }

        function renderLinks() {
            const container = document.getElementById('linksGrid');
            const filteredLinks = currentGroup === 'all' 
                ? allLinks 
                : allLinks.filter(link => link.group === currentGroup);

            if (filteredLinks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>📂 该分组暂无链接</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredLinks.map(link => `
                <a href="${link.url}" class="link-card" target="_blank">
                    <div class="card-icon">${link.icon || '🌐'}</div>
                    <div class="card-content">
                        <h3>${link.title}</h3>
                        ${link.group ? `<span class="card-group">${link.group}</span>` : ''}
                    </div>
                </a>
            `).join('');
        }

        loadLinks();
    </script>

    <style>
        .header-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: default;
        }

        .admin-link {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .admin-link:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .category-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .category-btn {
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .category-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .category-btn.active {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border-color: transparent;
        }

        .card-group {
            display: inline-block;
            font-size: 0.75rem;
            color: #00d9ff;
            background: rgba(0, 217, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 4px;
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            color: #666;
            padding: 60px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .empty-state p {
            color: #888;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .setup-btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 8px;
            color: #1a1a2e;
            text-decoration: none;
            font-weight: bold;
        }

        .error-hint {
            display: block;
            color: #666;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: #666;
            font-size: 0.85rem;
        }

        footer a {
            color: #00d9ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</body>
</html>

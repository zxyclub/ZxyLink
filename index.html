<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔗 收藏夹</h1>
            <p class="subtitle">一些有用的网站收藏</p>
        </header>

        <main class="links-grid">
            <a href="https://github.com" class="link-card" target="_blank">
                <div class="card-icon">🐙</div>
                <div class="card-content">
                    <h3>GitHub</h3>
                    <p>全球开发者社区</p>
                </div>
            </a>

            <a href="https://stackoverflow.com" class="link-card" target="_blank">
                <div class="card-icon">📚</div>
                <div class="card-content">
                    <h3>Stack Overflow</h3>
                    <p>编程问答平台</p>
                </div>
            </a>

            <a href="https://developer.mozilla.org" class="link-card" target="_blank">
                <div class="card-icon">📖</div>
                <div class="card-content">
                    <h3>MDN</h3>
                    <p>Web开发文档</p>
                </div>
            </a>

            <a href="https://www.google.com" class="link-card" target="_blank">
                <div class="card-icon">🔍</div>
                <div class="card-content">
                    <h3>Google</h3>
                    <p>搜索引擎</p>
                </div>
            </a>

            <a href="https://chat.openai.com" class="link-card" target="_blank">
                <div class="card-icon">🤖</div>
                <div class="card-content">
                    <h3>ChatGPT</h3>
                    <p>AI对话助手</p>
                </div>
            </a>

            <a href="#" class="link-card add-new" onclick="alert('点击编辑 index.html 添加你的链接！')">
                <div class="card-icon">➕</div>
                <div class="card-content">
                    <h3>添加链接</h3>
                    <p>点击这里添加新网站</p>
                </div>
            </a>
        </main>

        <footer>
            <p>使用 <a href="https://pages.github.com" target="_blank">GitHub Pages</a> 托管</p>
        </footer>
    </div>
</body>
</html>

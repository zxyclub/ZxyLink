<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔗 收藏夹</h1>
            <p class="subtitle">一些有用的网站收藏</p>
            <a href="login.html" class="admin-link">管理</a>
        </header>

        <main class="links-grid" id="linksGrid">
            <div class="loading">加载中...</div>
        </main>

        <footer>
            <p>使用 <a href="https://gist.github.com" target="_blank">GitHub Gist</a> 数据托管</p>
            <p class="deploy-info">
                页面可部署至：<br>
                <a href="https://pages.github.com" target="_blank">GitHub Pages</a> |
                <a href="https://vercel.com" target="_blank">Vercel</a> |
                <a href="https://pages.cloudflare.com" target="_blank">Cloudflare Pages</a>
            </p>
        </footer>
    </div>

    <script>
        // GitHub Gist 配置（硬编码）
        const GIST_ID = '310862d2eee876122d6358950caa04fe';

        async function loadLinks() {
            const container = document.getElementById('linksGrid');

            try {
                // 直接访问 Gist raw 文件
                const response = await fetch(`https://gist.githubusercontent.com/zxyclub/310862d2eee876122d6358950caa04fe/raw/links.json`);

                if (!response.ok) {
                    throw new Error('获取数据失败');
                }

                const links = await response.json();

                if (!Array.isArray(links) || links.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>📝 暂无链接</p>
                            <a href="login.html" class="setup-btn">添加链接</a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = links.map(link => `
                    <a href="${link.url}" class="link-card" target="_blank">
                        <div class="card-icon">${link.icon || '🌐'}</div>
                        <div class="card-content">
                            <h3>${link.title}</h3>
                            <p>${link.description || ''}</p>
                        </div>
                    </a>
                `).join('');
            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="empty-state">
                        <p>❌ 加载失败</p>
                        <span class="error-hint">请检查网络连接</span>
                    </div>
                `;
            }
        }

        loadLinks();
    </script>

    <style>
        .admin-link {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .admin-link:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            color: #666;
            padding: 60px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .empty-state p {
            color: #888;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .setup-btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 8px;
            color: #1a1a2e;
            text-decoration: none;
            font-weight: bold;
        }

        .error-hint {
            display: block;
            color: #666;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .deploy-info {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
        }

        .deploy-info a {
            color: #00d9ff;
            text-decoration: none;
        }

        .deploy-info a:hover {
            text-decoration: underline;
        }
    </style>
</body>
</html>

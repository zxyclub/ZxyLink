<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日木斤-导航页</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div class="header-right">
                    <img id="avatar" src="img/avatar1.jpg" alt="avatar" class="header-avatar">
                    <a href="private.html" class="admin-link">调试</a>
                    <a href="admin.html" class="admin-link">管理</a>
                </div>
            </div>
            <h1>🔗 日木斤的收藏夹</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索链接...">
                <button class="search-btn" id="searchBtn">🔍</button>
            </div>
            <nav class="category-nav" id="categoryNav">
                <button class="category-btn active" data-group="all">全部</button>
            </nav>
        </header>

        <main class="links-grid" id="linksGrid">
            <div class="loading">加载中...</div>
        </main>

        <footer>
            <p>使用 <a href="https://gist.github.com" target="_blank">GitHub Gist</a> 数据托管</p>
            <br>
            <p>该项目可以部署在</p>
            <p>·</p>
            <p><a href="https://pages.github.com/" target="_blank">Github Pages</a> |
            <a href="https://vercel.com" target="_blank">Vercel</a> |
            <a href="https://cloudflare.com" target="_blank">Cloudflare</a> |
            <a href="https://maoziyun.com" target="_blank">帽子云</a></p>
        </footer>
    </div>

    <script src="js/index.js"></script>
</body>
</html>

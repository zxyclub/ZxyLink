<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div class="header-right">
                <div class="avatar-selector" id="avatarSelector">
                    <img id="currentAvatar" src="avatars/avatar1.png" alt="avatar" class="header-avatar">
                    <div class="avatar-dropdown" id="avatarDropdown">
                        <img src="avatars/avatar1.png" data-avatar="avatars/avatar1.png" class="avatar-option">
                        <img src="avatars/avatar2.png" data-avatar="avatars/avatar2.png" class="avatar-option">
                        <img src="avatars/avatar3.png" data-avatar="avatars/avatar3.png" class="avatar-option">
                        <img src="avatars/avatar4.png" data-avatar="avatars/avatar4.png" class="avatar-option">
                        <img src="avatars/avatar5.png" data-avatar="avatars/avatar5.png" class="avatar-option">
                        <img src="avatars/avatar6.png" data-avatar="avatars/avatar6.png" class="avatar-option">
                    </div>
                </div>
                <a href="admin.html" class="admin-link">管理</a>
                <a href="private.html" class="admin-link">私密</a>
            </div>
            </div>
            <h1>🔗 收藏夹</h1>
            <nav class="category-nav" id="categoryNav">
                <button class="category-btn active" data-group="all">全部</button>
            </nav>
        </header>

        <main class="links-grid" id="linksGrid">
            <div class="loading">加载中...</div>
        </main>

        <footer>
            <p>使用 <a href="https://gist.github.com" target="_blank">GitHub Gist</a> 数据托管</p>
            <p>该项目可以部署在 <a href="https://vercel.com" target="_blank">Vercel</a> · <a href="https://cloudflare.com" target="_blank">Cloudflare</a> · <a href="https://maoziyun.com" target="_blank">帽子云</a></p>
        </footer>
    </div>

    <script>
        const GIST_ID = 'd12a422a770678dcbb46b8f8050ad2c6';
        const AVATAR_KEY = 'selected_avatar';
        let allLinks = [];
        let currentGroup = 'all';

        function initAvatarSelector() {
            const savedAvatar = localStorage.getItem(AVATAR_KEY);
            if (savedAvatar) {
                document.getElementById('currentAvatar').src = savedAvatar;
            }

            const selector = document.getElementById('avatarSelector');
            const dropdown = document.getElementById('avatarDropdown');

            selector.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('show');
            });

            dropdown.querySelectorAll('.avatar-option').forEach(img => {
                img.addEventListener('click', () => {
                    const avatarSrc = img.dataset.avatar;
                    document.getElementById('currentAvatar').src = avatarSrc;
                    localStorage.setItem(AVATAR_KEY, avatarSrc);
                    dropdown.classList.remove('show');
                });
            });

            document.addEventListener('click', () => {
                dropdown.classList.remove('show');
            });
        }

        async function loadLinks() {
            const container = document.getElementById('linksGrid');

            try {
                const response = await fetch(`https://gist.githubusercontent.com/zxyclub/${GIST_ID}/raw/zxylinks.json?t=${Date.now()}`);

                if (!response.ok) {
                    throw new Error('获取数据失败');
                }

                allLinks = await response.json();

                if (!Array.isArray(allLinks) || allLinks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>📝 暂无链接</p>
                            <a href="admin.html" class="setup-btn">添加链接</a>
                        </div>
                    `;
                    return;
                }

                renderCategories();
                renderLinks();
            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="empty-state">
                        <p>❌ 加载失败</p>
                        <span class="error-hint">请检查网络连接</span>
                    </div>
                `;
            }
        }

        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            const groups = [...new Set(allLinks.map(link => link.group).filter(Boolean))];
            
            let html = '<button class="category-btn active" data-group="all">全部</button>';
            groups.forEach(group => {
                const isActive = group === currentGroup ? 'active' : '';
                html += `<button class="category-btn ${isActive}" data-group="${group}">${group}</button>`;
            });
            nav.innerHTML = html;

            nav.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentGroup = btn.dataset.group;
                    renderLinks();
                });
            });
        }

        function renderLinks() {
            const container = document.getElementById('linksGrid');
            const filteredLinks = currentGroup === 'all' 
                ? allLinks 
                : allLinks.filter(link => link.group === currentGroup);

            if (filteredLinks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>📂 该分组暂无链接</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredLinks.map(link => `
                <a href="${link.url}" class="link-card" target="_blank">
                    <div class="card-icon">${link.icon || '🌐'}</div>
                    <div class="card-content">
                        <h3>${link.title}</h3>
                        ${link.group ? `<span class="card-group">${link.group}</span>` : ''}
                    </div>
                </a>
            `).join('');
        }

        initAvatarSelector();
        loadLinks();
    </script>

    <style>
        .header-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s;
        }

        .avatar-selector {
            position: relative;
        }

        .avatar-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 10px;
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 12px;
            background: rgba(30, 30, 50, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .avatar-dropdown.show {
            display: grid;
        }

        .avatar-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .avatar-option:hover {
            border-color: #00d9ff;
            transform: scale(1.1);
        }

        .admin-link {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .admin-link:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .category-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .category-btn {
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .category-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .category-btn.active {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border-color: transparent;
        }

        .card-group {
            display: inline-block;
            font-size: 0.75rem;
            color: #00d9ff;
            background: rgba(0, 217, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 4px;
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            color: #666;
            padding: 60px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .empty-state p {
            color: #888;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .setup-btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 8px;
            color: #1a1a2e;
            text-decoration: none;
            font-weight: bold;
        }

        .error-hint {
            display: block;
            color: #666;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: #666;
            font-size: 0.85rem;
        }

        footer a {
            color: #00d9ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</body>
</html>

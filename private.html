<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私密收藏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="private-container">
        <div class="private-header">
            <div class="private-header-top">
                <div class="header-right">
                    <img id="avatar" src="" alt="avatar" class="header-avatar">
                    <a href="admin.html" class="back-link">管理</a>
                    <a href="index.html" class="back-link">返回</a>
                </div>
            </div>
            <div class="private-title">
                <h1>🔒 私密收藏</h1>
            </div>
            <nav class="category-nav" id="categoryNav">
                <button class="category-btn active" data-group="all">全部</button>
            </nav>
        </div>

        <div id="loginArea">
            <div class="login-card">
                <h2>🔐 访问私密内容</h2>
                <p>输入 GitHub Token 访问您的私密收藏</p>
                <p id="errorMsg" class="error-msg" style="display: none;"></p>
                <p id="successMsg" class="success-msg" style="display: none;"></p>
                <input type="text" id="privateToken" placeholder="输入 GitHub Token">
                <button onclick="accessPrivate()">访问</button>
            </div>
        </div>

        <div id="linksArea" style="display: none;">
            <main class="links-grid" id="privateLinksGrid">
                <div class="loading">加载中...</div>
            </main>
        </div>
    </div>

    <script src="private.js"></script>
</body>
</html>

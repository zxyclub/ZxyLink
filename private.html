<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日木斤-调试页面</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/private.css">
</head>
<body>
    <div class="private-container">
        <div class="private-header">
            <h1>🔧 调试页面</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="img/avatar1.jpg" alt="avatar" style="width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);">
                <a href="index.html" class="back-link">返回主页</a>
            </div>
        </div>

        <div id="loginArea">
            <div class="login-card">
                <h2>🔧 访问调试内容</h2>
                <p>输入 Token 访问调试数据</p>
                <p id="errorMsg" class="error-msg" style="display: none;"></p>
                <p id="successMsg" class="success-msg" style="display: none;"></p>
                <input type="text" id="privateToken" placeholder="输入 GitHub Token">
                <div style="display: flex; gap: 10px;">
                    <button onclick="accessPrivate()">访问</button>
                    <button onclick="clearToken()" style="background: rgba(255, 107, 107, 0.2);">清除 Token</button>
                </div>
            </div>
        </div>

        <div id="linksArea" style="display: none;">
            <div class="search-box">
                <input type="text" id="privateSearchInput" placeholder="搜索链接...">
                <button class="search-btn" id="privateSearchBtn">🔍</button>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <button onclick="clearToken()" style="background: rgba(255, 107, 107, 0.2); padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; color: #ff6b6b;">🔑 清除 Token</button>
                <button class="export-btn" id="privateExportBtn">📥 导出</button>
            </div>
            <nav class="category-nav" id="privateCategoryNav">
                <button class="category-btn active" data-group="all">全部</button>
            </nav>
            
            <main class="links-grid" id="privateLinksGrid">
                <div class="loading">加载中...</div>
            </main>
        </div>
    </div>

    <script src="js/private.js"></script>

    <div class="modal-overlay" id="privateExportModal">
        <div class="modal-content">
            <h3>📥 导出链接</h3>
            <p>确定要导出当前链接数据吗？</p>
            <div class="modal-btns">
                <button class="modal-btn modal-btn-cancel" id="privateModalCancel">取消</button>
                <button class="modal-btn modal-btn-confirm" id="privateModalConfirm">确定导出</button>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私密收藏</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .private-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .private-header {
            margin-bottom: 20px;
        }

        .private-header-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .back-link {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .private-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .private-title h1 {
            font-size: 1.6rem;
        }

        .category-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .category-btn {
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .category-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .category-btn.active {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border-color: transparent;
        }

        .card-group {
            display: inline-block;
            font-size: 0.75rem;
            color: #00d9ff;
            background: rgba(0, 217, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 4px;
        }

        .login-card {
            max-width: 450px;
            margin: 80px auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.6rem;
        }

        .login-card p {
            color: #888;
            text-align: center;
            margin-bottom: 24px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .login-card input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 16px;
            font-family: monospace;
        }

        .login-card input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-card button:hover {
            transform: scale(1.02);
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            color: #666;
            padding: 60px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .empty-state p {
            color: #888;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 16px;
        }

        .success-msg {
            color: #00ff88;
            text-align: center;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="private-container">
        <div class="private-header">
            <div class="private-header-top">
                <div class="header-right">
                    <img id="avatar" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0NSIgZmlsbD0iIzMzMyIgc3Ryb2tlPSIjNjY2IiBzdHJva2Utd2lkdGg9IjIiLz48dGV4dCB4PSI1MCIgeT0iNTUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiM5OTkiIGZvbnQtc2l6ZT0iNDAiIGZvbnQtZmFtaWx5PSJBcmlhbCI+PC90ZXh0Pjwvc3ZnPg==" alt="avatar" class="header-avatar">
                    <a href="admin.html" class="back-link">管理</a>
                    <a href="index.html" class="back-link">返回</a>
                </div>
            </div>
            <div class="private-title">
                <h1>🔒 私密收藏</h1>
            </div>
            <nav class="category-nav" id="categoryNav">
                <button class="category-btn active" data-group="all">全部</button>
            </nav>
        </div>

        <div id="loginArea">
            <div class="login-card">
                <h2>🔐 访问私密内容</h2>
                <p>输入 GitHub Token 访问您的私密收藏</p>
                <p id="errorMsg" class="error-msg" style="display: none;"></p>
                <p id="successMsg" class="success-msg" style="display: none;"></p>
                <input type="text" id="privateToken" placeholder="输入 GitHub Token">
                <button onclick="accessPrivate()">访问</button>
            </div>
        </div>

        <div id="linksArea" style="display: none;">
            <main class="links-grid" id="privateLinksGrid">
                <div class="loading">加载中...</div>
            </main>
        </div>
    </div>

    <script>
        const PRIVATE_FILENAME = 'zxylink-private.json';
        const TOKEN_STORAGE_KEY = 'zxylink_private_token';
        const AVATAR_KEY = 'zxylink_private_avatar';
        let allLinks = [];
        let currentGroup = 'all';

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(msg) {
            const successMsg = document.getElementById('successMsg');
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function loadAvatar() {
            const avatar = localStorage.getItem(AVATAR_KEY);
            if (avatar) {
                document.getElementById('avatar').src = avatar;
            }
        }

        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            const groups = [...new Set(allLinks.map(link => link.group).filter(Boolean))];

            let html = '<button class="category-btn active" data-group="all">全部</button>';
            groups.forEach(group => {
                const isActive = group === currentGroup ? 'active' : '';
                html += `<button class="category-btn ${isActive}" data-group="${group}">${group}</button>`;
            });
            nav.innerHTML = html;

            nav.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentGroup = btn.dataset.group;
                    renderLinks();
                });
            });
        }

        function renderLinks() {
            const container = document.getElementById('privateLinksGrid');
            const filteredLinks = currentGroup === 'all'
                ? allLinks
                : allLinks.filter(link => link.group === currentGroup);

            if (filteredLinks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>📂 该分组暂无链接</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredLinks.map(link => `
                <a href="${link.url}" class="link-card" target="_blank">
                    <div class="card-icon">${link.icon || '🌐'}</div>
                    <div class="card-content">
                        <h3>${link.title}</h3>
                        ${link.group ? `<span class="card-group">${link.group}</span>` : ''}
                    </div>
                </a>
            `).join('');
        }

        async function loadPrivateLinks(token) {
            try {
                const response = await fetch('https://api.github.com/gists', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Accept': 'application/vnd.github+json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Token 无效或权限不足');
                }

                const gists = await response.json();

                let targetGistId = null;
                for (const gist of gists) {
                    if (gist.files && gist.files[PRIVATE_FILENAME]) {
                        targetGistId = gist.id;
                        break;
                    }
                }

                if (!targetGistId) {
                    throw new Error(`未找到包含 ${PRIVATE_FILENAME} 的 Gist`);
                }

                const gistResponse = await fetch(`https://api.github.com/gists/${targetGistId}`, {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Accept': 'application/vnd.github+json'
                    }
                });

                if (!gistResponse.ok) {
                    throw new Error('获取 Gist 内容失败');
                }

                const targetGist = await gistResponse.json();
                const privateFile = targetGist.files ? targetGist.files[PRIVATE_FILENAME] : null;
                if (!privateFile) {
                    throw new Error(`未找到 ${PRIVATE_FILENAME} 文件`);
                }
                const fileContent = privateFile.content;
                if (!fileContent || fileContent.trim() === '') {
                    throw new Error('私密文件内容为空，请在管理后台添加私密链接');
                }
                allLinks = JSON.parse(fileContent);

                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('linksArea').style.display = 'block';

                renderCategories();
                renderLinks();
                localStorage.setItem(TOKEN_STORAGE_KEY, token);
                showSuccess('访问成功！');

            } catch (error) {
                console.error(error);
                showError(error.message);
            }
        }

        function accessPrivate() {
            const token = document.getElementById('privateToken').value.trim();

            if (!token) {
                showError('请输入 Token');
                return;
            }

            loadPrivateLinks(token);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadAvatar();
            const savedToken = localStorage.getItem(TOKEN_STORAGE_KEY);
            if (savedToken) {
                document.getElementById('privateToken').value = savedToken;
                loadPrivateLinks(savedToken);
            }
        });

        document.getElementById('privateToken').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                accessPrivate();
            }
        });
    </script>
</body>
</html>

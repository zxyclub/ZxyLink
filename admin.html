<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 导航页</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .admin-header h1 {
            font-size: 1.8rem;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            color: #ff6b6b;
            cursor: pointer;
            text-decoration: none;
        }

        .admin-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .admin-section h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 80px 1fr 1fr 100px auto;
            gap: 12px;
            align-items: end;
        }

        .form-row input {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
        }

        .form-row input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .form-row .icon-input {
            text-align: center;
            font-size: 1.2rem;
        }

        .btn-add {
            padding: 10px 24px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: grid;
            grid-template-columns: 60px 1fr 1fr 100px auto;
            gap: 12px;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .link-item .icon {
            font-size: 1.5rem;
            text-align: center;
        }

        .link-item .title {
            font-weight: bold;
            color: #fff;
        }

        .link-item .url {
            color: #888;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-item .desc {
            color: #666;
            font-size: 0.85rem;
        }

        .link-item .actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-edit {
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
        }

        .btn-delete {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .btn-save {
            padding: 8px 16px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 6px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        .btn-cancel {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            display: none;
        }

        .empty-msg {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .config-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .config-section h3 {
            margin-bottom: 16px;
            color: #888;
            font-size: 1rem;
        }

        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .config-row input {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .config-row input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>⚙️ 管理后台</h1>
            <a href="index.html" class="logout-btn">返回主页</a>
        </div>

        <div class="admin-section">
            <h2>➕ 添加新链接</h2>
            <form id="addForm" class="form-row">
                <input type="text" class="icon-input" id="newIcon" value="🌐" maxlength="2">
                <input type="text" id="newTitle" placeholder="网站名称" required>
                <input type="url" id="newUrl" placeholder="https://example.com" required>
                <input type="text" id="newDesc" placeholder="描述">
                <button type="submit" class="btn-add">添加</button>
            </form>
        </div>

        <div class="admin-section">
            <h2>📋 链接列表</h2>
            <div id="linksList" class="links-list"></div>
        </div>

        <div class="admin-section config-section">
            <h3>🔑 JSONBin.io 配置（首次使用需配置）</h3>
            <div class="config-row">
                <input type="text" id="binId" placeholder="Bin ID">
                <input type="text" id="apiKey" placeholder="API Key">
            </div>
            <button class="btn-add" onclick="saveConfig()">保存配置</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const BIN_ID_KEY = 'jsonbin_id';
        const API_KEY_KEY = 'jsonbin_apikey';
        const LINKS_KEY = 'links_data';

        let links = [];

        function checkAuth() {
            if (sessionStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.toggle('error', isError);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function getConfig() {
            return {
                binId: localStorage.getItem(BIN_ID_KEY),
                apiKey: localStorage.getItem(API_KEY_KEY)
            };
        }

        function saveConfig() {
            const binId = document.getElementById('binId').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            if (binId && apiKey) {
                localStorage.setItem(BIN_ID_KEY, binId);
                localStorage.setItem(API_KEY_KEY, apiKey);
                showToast('配置已保存！');
            } else {
                showToast('请填写完整的 Bin ID 和 API Key', true);
            }
        }

        function loadConfig() {
            const config = getConfig();
            if (config.binId) document.getElementById('binId').value = config.binId;
            if (config.apiKey) document.getElementById('apiKey').value = config.apiKey;
        }

        async function fetchLinks() {
            const config = getConfig();
            if (!config.binId || !config.apiKey) {
                document.getElementById('linksList').innerHTML = '<p class="empty-msg">请先配置 JSONBin.io 的 Bin ID 和 API Key</p>';
                return;
            }

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${config.binId}`, {
                    headers: {
                        'X-Access-Key': config.apiKey
                    }
                });
                const data = await response.json();
                links = data.record.links || [];
                renderLinks();
            } catch (error) {
                showToast('加载数据失败，请检查配置', true);
                console.error(error);
            }
        }

        async function saveLinks() {
            const config = getConfig();
            if (!config.binId || !config.apiKey) {
                showToast('请先配置 JSONBin.io', true);
                return;
            }

            try {
                await fetch(`https://api.jsonbin.io/v3/b/${config.binId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Access-Key': config.apiKey
                    },
                    body: JSON.stringify({ links })
                });
                showToast('保存成功！');
            } catch (error) {
                showToast('保存失败', true);
                console.error(error);
            }
        }

        function renderLinks() {
            const container = document.getElementById('linksList');
            if (links.length === 0) {
                container.innerHTML = '<p class="empty-msg">暂无链接，请添加</p>';
                return;
            }

            container.innerHTML = links.map((link, index) => `
                <div class="link-item" data-index="${index}">
                    <div class="icon">${link.icon}</div>
                    <div class="title">${link.title}</div>
                    <div class="url">${link.url}</div>
                    <div class="desc">${link.description || ''}</div>
                    <div class="actions">
                        <button class="btn-edit" onclick="editLink(${index})">编辑</button>
                        <button class="btn-delete" onclick="deleteLink(${index})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('addForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newLink = {
                icon: document.getElementById('newIcon').value || '🌐',
                title: document.getElementById('newTitle').value,
                url: document.getElementById('newUrl').value,
                description: document.getElementById('newDesc').value
            };

            links.push(newLink);
            await saveLinks();
            renderLinks();

            document.getElementById('addForm').reset();
            document.getElementById('newIcon').value = '🌐';
        });

        window.editLink = function(index) {
            const link = links[index];
            const item = document.querySelector(`[data-index="${index}"]`);

            item.innerHTML = `
                <div class="icon">
                    <input type="text" value="${link.icon}" style="width:50px;text-align:center;font-size:1.2rem" id="editIcon">
                </div>
                <input type="text" value="${link.title}" id="editTitle">
                <input type="url" value="${link.url}" id="editUrl">
                <input type="text" value="${link.description || ''}" id="editDesc">
                <div class="actions">
                    <button class="btn-save" onclick="saveEdit(${index})">保存</button>
                    <button class="btn-cancel" onclick="renderLinks()">取消</button>
                </div>
            `;

            document.getElementById('editTitle').focus();
        };

        window.saveEdit = async function(index) {
            links[index] = {
                icon: document.getElementById('editIcon').value || '🌐',
                title: document.getElementById('editTitle').value,
                url: document.getElementById('editUrl').value,
                description: document.getElementById('editDesc').value
            };
            await saveLinks();
            renderLinks();
        };

        window.deleteLink = async function(index) {
            if (confirm('确定要删除这个链接吗？')) {
                links.splice(index, 1);
                await saveLinks();
                renderLinks();
            }
        };

        checkAuth();
        loadConfig();
        fetchLinks();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 导航页</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .admin-header h1 {
            font-size: 1.8rem;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            color: #ff6b6b;
            cursor: pointer;
            text-decoration: none;
        }

        .admin-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .admin-section h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 80px 1fr 1fr 100px auto;
            gap: 12px;
            align-items: end;
        }

        .form-row input {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
        }

        .form-row input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .form-row .icon-input {
            text-align: center;
            font-size: 1.2rem;
        }

        .btn-add {
            padding: 10px 24px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: grid;
            grid-template-columns: 60px 1fr 1fr 100px auto;
            gap: 12px;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .link-item .icon {
            font-size: 1.5rem;
            text-align: center;
        }

        .link-item .title {
            font-weight: bold;
            color: #fff;
        }

        .link-item .url {
            color: #888;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-item .desc {
            color: #666;
            font-size: 0.85rem;
        }

        .link-item .actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-edit {
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
        }

        .btn-delete {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .btn-save {
            padding: 8px 16px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 6px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        .btn-cancel {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            display: none;
        }

        .disabled-section {
            opacity: 0.5;
            pointer-events: none;
        }

        .hidden {
            display: none !important;
        }

        .empty-msg {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .config-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .config-section h3 {
            margin-bottom: 16px;
            color: #888;
            font-size: 1rem;
        }

        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .config-row input {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .config-row input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
        }

        .help-text {
            color: #666;
            font-size: 0.85rem;
            margin-top: 12px;
            line-height: 1.6;
        }

        .help-text a {
            color: #00d9ff;
            text-decoration: none;
        }

        .tab-btn {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .tab-btn.active {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border-color: transparent;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>⚙️ 管理后台</h1>
            <a href="index.html" class="logout-btn">返回主页</a>
        </div>

        <div class="admin-section">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="tab-btn active" onclick="switchTab('public')">公开链接</button>
                <button class="tab-btn" onclick="switchTab('private')">私密链接</button>
            </div>

            <div id="publicSection">
                <div id="editSection" class="hidden">
                    <h2>➕ 添加新链接</h2>
                    <form id="addForm" class="form-row">
                        <input type="text" class="icon-input" id="newIcon" value="🌐" maxlength="2">
                        <input type="text" id="newTitle" placeholder="网站名称" required>
                        <input type="url" id="newUrl" placeholder="https://example.com" required>
                        <input type="text" id="newDesc" placeholder="描述">
                        <button type="submit" class="btn-add">添加</button>
                    </form>
                </div>

                <h2>📋 链接列表</h2>
                <div id="noTokenMsg" class="empty-msg hidden">请先配置 GitHub Token 以启用修改功能</div>
                <div id="linksList" class="links-list"></div>
            </div>

            <div id="privateSection" class="hidden">
                <div id="privateEditSection" class="hidden">
                    <h2>➕ 添加新私密链接</h2>
                    <form id="privateAddForm" class="form-row">
                        <input type="text" class="icon-input" id="newPrivateIcon" value="🌐" maxlength="2">
                        <input type="text" id="newPrivateTitle" placeholder="网站名称" required>
                        <input type="url" id="newPrivateUrl" placeholder="https://example.com" required>
                        <input type="text" id="newPrivateDesc" placeholder="描述">
                        <button type="submit" class="btn-add">添加</button>
                    </form>
                </div>

                <h2>📋 私密链接列表</h2>
                <div id="privateNoTokenMsg" class="empty-msg hidden">请先配置 GitHub Token 以启用修改功能</div>
                <div id="privateLinksList" class="links-list"></div>
            </div>
        </div>

        <div class="admin-section config-section" id="tokenSection">
            <h3>🔑 GitHub Token 配置</h3>
            <div class="config-row">
                <input type="text" id="githubToken" placeholder="GitHub Personal Access Token">
            </div>
            <button class="btn-add" onclick="saveToken()">保存 Token</button>
            <p class="help-text">
                <strong>注意：</strong>Token 仅用于修改数据，读取无需 Token<br>
                <a href="https://github.com/settings/tokens" target="_blank">生成 Token</a>，仅需勾选 <code>gist</code> 权限
            </p>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // 配置
        const PUBLIC_GIST_ID = 'd12a422a770678dcbb46b8f8050ad2c6';
        const PUBLIC_FILENAME = 'zxylinks.json';
        const PRIVATE_FILENAME = 'zxylink-private.json';
        const TOKEN_KEY = 'github_token';

        let currentTab = 'public';
        let publicLinks = [];
        let privateLinks = [];
        let privateGistId = null;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.toggle('error', isError);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function getToken() {
            return localStorage.getItem(TOKEN_KEY);
        }

        function saveToken() {
            const token = document.getElementById('githubToken').value.trim();
            if (token) {
                localStorage.setItem(TOKEN_KEY, token);
                showToast('Token 已保存！');
                toggleEditMode(true);
                if (currentTab === 'private') {
                    loadPrivateLinks(token);
                }
            } else {
                localStorage.removeItem(TOKEN_KEY);
                showToast('请输入 Token', true);
                toggleEditMode(false);
            }
        }

        function toggleEditMode(hasToken) {
            // 公开链接
            const editSection = document.getElementById('editSection');
            const linksList = document.getElementById('linksList');
            const noTokenMsg = document.getElementById('noTokenMsg');
            
            if (hasToken) {
                editSection.classList.remove('hidden');
                noTokenMsg.classList.add('hidden');
                linksList.classList.remove('hidden');
            } else {
                editSection.classList.add('hidden');
                if (publicLinks.length === 0) {
                    noTokenMsg.classList.remove('hidden');
                    linksList.classList.add('hidden');
                }
            }

            // 私密链接
            const privateEditSection = document.getElementById('privateEditSection');
            const privateLinksList = document.getElementById('privateLinksList');
            const privateNoTokenMsg = document.getElementById('privateNoTokenMsg');
            
            if (hasToken) {
                privateEditSection.classList.remove('hidden');
                privateNoTokenMsg.classList.add('hidden');
                privateLinksList.classList.remove('hidden');
            } else {
                privateEditSection.classList.add('hidden');
                if (privateLinks.length === 0) {
                    privateNoTokenMsg.classList.remove('hidden');
                    privateLinksList.classList.add('hidden');
                }
            }

            renderPublicLinks();
            renderPrivateLinks();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'public') {
                document.getElementById('publicSection').classList.remove('hidden');
                document.getElementById('privateSection').classList.add('hidden');
            } else {
                document.getElementById('publicSection').classList.add('hidden');
                document.getElementById('privateSection').classList.remove('hidden');
                const token = getToken();
                if (token && privateLinks.length === 0) {
                    loadPrivateLinks(token);
                }
            }
        }

        function loadToken() {
            const token = getToken();
            if (token) {
                document.getElementById('githubToken').value = token;
            }
            toggleEditMode(!!token);
        }

        async function fetchPublicLinks() {
            try {
                const response = await fetch(`https://gist.githubusercontent.com/zxyclub/${PUBLIC_GIST_ID}/raw/${PUBLIC_FILENAME}?t=${Date.now()}`);
                if (!response.ok) throw new Error('获取数据失败');
                publicLinks = await response.json();
                if (!Array.isArray(publicLinks)) publicLinks = [];
                renderPublicLinks();
            } catch (error) {
                showToast('加载公开数据失败', true);
                console.error(error);
            }
        }

        async function loadPrivateLinks(token) {
            try {
                const response = await fetch('https://api.github.com/gists', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Accept': 'application/vnd.github+json'
                    }
                });

                if (!response.ok) throw new Error('Token 无效或权限不足');
                
                const gists = await response.json();
                let targetGist = null;
                for (const gist of gists) {
                    if (gist.files && gist.files[PRIVATE_FILENAME]) {
                        targetGist = gist;
                        break;
                    }
                }

                if (targetGist) {
                    privateGistId = targetGist.id;
                    privateLinks = JSON.parse(targetGist.files[PRIVATE_FILENAME].content);
                    if (!Array.isArray(privateLinks)) privateLinks = [];
                } else {
                    privateLinks = [];
                }
                renderPrivateLinks();
            } catch (error) {
                showToast('加载私密数据失败: ' + error.message, true);
                console.error(error);
            }
        }

        async function savePublicLinks() {
            const token = getToken();
            if (!token) {
                showToast('请先配置 Token', true);
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/gists/${PUBLIC_GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github+json'
                    },
                    body: JSON.stringify({
                        files: {
                            [PUBLIC_FILENAME]: {
                                content: JSON.stringify(publicLinks, null, 2)
                            }
                        }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || '保存失败');
                }

                showToast('保存成功！');
            } catch (error) {
                showToast('保存失败: ' + error.message, true);
                console.error(error);
            }
        }

        async function savePrivateLinks() {
            const token = getToken();
            if (!token) {
                showToast('请先配置 Token', true);
                return;
            }

            try {
                if (privateGistId) {
                    // 更新已有的 Gist
                    const response = await fetch(`https://api.github.com/gists/${privateGistId}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github+json'
                        },
                        body: JSON.stringify({
                            files: {
                                [PRIVATE_FILENAME]: {
                                    content: JSON.stringify(privateLinks, null, 2)
                                }
                            }
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.message || '保存失败');
                    }
                } else {
                    // 创建新的 Gist
                    const response = await fetch('https://api.github.com/gists', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github+json'
                        },
                        body: JSON.stringify({
                            description: 'ZxyLink Private Links',
                            public: false,
                            files: {
                                [PRIVATE_FILENAME]: {
                                    content: JSON.stringify(privateLinks, null, 2)
                                }
                            }
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.message || '创建失败');
                    }

                    const newGist = await response.json();
                    privateGistId = newGist.id;
                }

                showToast('保存成功！');
            } catch (error) {
                showToast('保存失败: ' + error.message, true);
                console.error(error);
            }
        }

        function renderPublicLinks() {
            const container = document.getElementById('linksList');
            const hasToken = getToken();
            
            if (publicLinks.length === 0) {
                container.innerHTML = hasToken ? '<p class="empty-msg">暂无链接，请添加</p>' : '';
                return;
            }

            container.innerHTML = publicLinks.map((link, index) => {
                const actionsHtml = hasToken ? `
                    <div class="actions">
                        <button class="btn-edit" onclick="editPublicLink(${index})">编辑</button>
                        <button class="btn-delete" onclick="deletePublicLink(${index})">删除</button>
                    </div>
                ` : '';

                return `
                    <div class="link-item" data-index="${index}">
                        <div class="icon">${link.icon}</div>
                        <div class="title">${link.title}</div>
                        <div class="url">${link.url}</div>
                        <div class="desc">${link.description || ''}</div>
                        ${actionsHtml}
                    </div>
                `;
            }).join('');
        }

        function renderPrivateLinks() {
            const container = document.getElementById('privateLinksList');
            const hasToken = getToken();
            
            if (privateLinks.length === 0) {
                container.innerHTML = hasToken ? '<p class="empty-msg">暂无私密链接，请添加</p>' : '';
                return;
            }

            container.innerHTML = privateLinks.map((link, index) => {
                const actionsHtml = hasToken ? `
                    <div class="actions">
                        <button class="btn-edit" onclick="editPrivateLink(${index})">编辑</button>
                        <button class="btn-delete" onclick="deletePrivateLink(${index})">删除</button>
                    </div>
                ` : '';

                return `
                    <div class="link-item" data-index="${index}">
                        <div class="icon">${link.icon}</div>
                        <div class="title">${link.title}</div>
                        <div class="url">${link.url}</div>
                        <div class="desc">${link.description || ''}</div>
                        ${actionsHtml}
                    </div>
                `;
            }).join('');
        }

        // 公开链接处理
        document.getElementById('addForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newLink = {
                icon: document.getElementById('newIcon').value || '🌐',
                title: document.getElementById('newTitle').value,
                url: document.getElementById('newUrl').value,
                description: document.getElementById('newDesc').value
            };

            publicLinks.push(newLink);
            await savePublicLinks();
            renderPublicLinks();

            document.getElementById('addForm').reset();
            document.getElementById('newIcon').value = '🌐';
        });

        window.editPublicLink = function(index) {
            const link = publicLinks[index];
            const item = document.querySelector(`#publicSection [data-index="${index}"]`);

            item.innerHTML = `
                <div class="icon">
                    <input type="text" value="${link.icon}" style="width:50px;text-align:center;font-size:1.2rem" id="editIcon">
                </div>
                <input type="text" value="${link.title}" id="editTitle">
                <input type="url" value="${link.url}" id="editUrl">
                <input type="text" value="${link.description || ''}" id="editDesc">
                <div class="actions">
                    <button class="btn-save" onclick="savePublicEdit(${index})">保存</button>
                    <button class="btn-cancel" onclick="renderPublicLinks()">取消</button>
                </div>
            `;
            document.getElementById('editTitle').focus();
        };

        window.savePublicEdit = async function(index) {
            publicLinks[index] = {
                icon: document.getElementById('editIcon').value || '🌐',
                title: document.getElementById('editTitle').value,
                url: document.getElementById('editUrl').value,
                description: document.getElementById('editDesc').value
            };
            await savePublicLinks();
            renderPublicLinks();
        };

        window.deletePublicLink = async function(index) {
            if (confirm('确定要删除这个链接吗？')) {
                publicLinks.splice(index, 1);
                await savePublicLinks();
                renderPublicLinks();
            }
        };

        // 私密链接处理
        document.getElementById('privateAddForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newLink = {
                icon: document.getElementById('newPrivateIcon').value || '🌐',
                title: document.getElementById('newPrivateTitle').value,
                url: document.getElementById('newPrivateUrl').value,
                description: document.getElementById('newPrivateDesc').value
            };

            privateLinks.push(newLink);
            await savePrivateLinks();
            renderPrivateLinks();

            document.getElementById('privateAddForm').reset();
            document.getElementById('newPrivateIcon').value = '🌐';
        });

        window.editPrivateLink = function(index) {
            const link = privateLinks[index];
            const item = document.querySelector(`#privateSection [data-index="${index}"]`);

            item.innerHTML = `
                <div class="icon">
                    <input type="text" value="${link.icon}" style="width:50px;text-align:center;font-size:1.2rem" id="editPrivateIcon">
                </div>
                <input type="text" value="${link.title}" id="editPrivateTitle">
                <input type="url" value="${link.url}" id="editPrivateUrl">
                <input type="text" value="${link.description || ''}" id="editPrivateDesc">
                <div class="actions">
                    <button class="btn-save" onclick="savePrivateEdit(${index})">保存</button>
                    <button class="btn-cancel" onclick="renderPrivateLinks()">取消</button>
                </div>
            `;
            document.getElementById('editPrivateTitle').focus();
        };

        window.savePrivateEdit = async function(index) {
            privateLinks[index] = {
                icon: document.getElementById('editPrivateIcon').value || '🌐',
                title: document.getElementById('editPrivateTitle').value,
                url: document.getElementById('editPrivateUrl').value,
                description: document.getElementById('editPrivateDesc').value
            };
            await savePrivateLinks();
            renderPrivateLinks();
        };

        window.deletePrivateLink = async function(index) {
            if (confirm('确定要删除这个链接吗？')) {
                privateLinks.splice(index, 1);
                await savePrivateLinks();
                renderPrivateLinks();
            }
        };

        loadToken();
        fetchPublicLinks();
    </script>
</body>
</html>

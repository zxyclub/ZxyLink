<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 导航页</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .admin-header h1 {
            font-size: 1.8rem;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            color: #ff6b6b;
            cursor: pointer;
            text-decoration: none;
        }

        .admin-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .admin-section h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-row .form-main {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .form-row .icon-input {
            width: 60px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            text-align: center;
            font-size: 1.2rem;
        }

        .form-row .form-main input {
            flex: 1;
            min-width: 150px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
        }

        .form-row input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .form-row .form-actions {
            display: flex;
            justify-content: flex-end;
        }

        .btn-add {
            padding: 10px 24px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: stretch;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            overflow: hidden;
        }

        .link-item .icon-box {
            width: 60px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .link-item .content-box {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .link-item .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .link-item .title {
            font-weight: bold;
            color: #fff;
            font-size: 1rem;
        }

        .link-item .desc {
            color: #888;
            font-size: 0.85rem;
        }

        .link-item .actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .link-item .url-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .link-item .url {
            color: #00d9ff;
            font-size: 0.8rem;
            word-break: break-all;
            flex: 1;
            min-width: 0;
        }

        .btn-edit, .btn-delete {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .btn-edit {
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
        }

        .btn-delete {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .btn-save {
            padding: 6px 12px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 6px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-cancel {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .edit-item {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
        }

        .edit-item .edit-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .edit-item .edit-row input {
            flex: 1;
            min-width: 120px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
        }

        .edit-item .edit-row input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .edit-item .edit-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .hidden {
            display: none !important;
        }

        .empty-msg {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .config-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .config-section h3 {
            margin-bottom: 16px;
            color: #888;
            font-size: 1rem;
        }

        .config-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .config-row input {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .config-row input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
        }

        .help-text {
            color: #666;
            font-size: 0.85rem;
            margin-top: 12px;
            line-height: 1.6;
        }

        .help-text a {
            color: #00d9ff;
            text-decoration: none;
        }

        .tab-btn {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .tab-btn.active {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border-color: transparent;
        }

        @media (min-width: 768px) {
            .form-row {
                flex-direction: row;
                align-items: flex-end;
            }

            .form-row .form-main {
                flex: 1;
            }

            .config-row {
                flex-direction: row;
            }

            .config-row input {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>⚙️ 管理后台</h1>
            <a href="index.html" class="logout-btn">返回主页</a>
        </div>

        <div class="admin-section">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="tab-btn active" onclick="switchTab('public')">公开链接</button>
                <button class="tab-btn" onclick="switchTab('private')">私密链接</button>
            </div>

            <div id="publicSection">
                <div id="editSection" class="hidden">
                    <h2>➕ 添加新链接</h2>
                    <form id="addForm" class="form-row">
                        <div class="form-main">
                            <input type="text" class="icon-input" id="newIcon" value="🌐" maxlength="2">
                            <input type="text" id="newTitle" placeholder="网站名称" required>
                            <input type="text" id="newUrl" placeholder="https://example.com" required>
                            <input type="text" id="newGroup" placeholder="分组">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-add">添加</button>
                        </div>
                    </form>
                </div>

                <h2>📋 链接列表</h2>
                <div id="noTokenMsg" class="empty-msg hidden">请先配置 GitHub Token 以启用修改功能</div>
                <div id="linksList" class="links-list"></div>
            </div>

            <div id="privateSection" class="hidden">
                <div id="privateEditSection" class="hidden">
                    <h2>➕ 添加新私密链接</h2>
                    <form id="privateAddForm" class="form-row">
                        <div class="form-main">
                            <input type="text" class="icon-input" id="newPrivateIcon" value="🌐" maxlength="2">
                            <input type="text" id="newPrivateTitle" placeholder="网站名称" required>
                            <input  id="newPrivateUrl" placeholder="https://example.com" required>
                            <input type="text" id="newPrivateDesc" placeholder="分组">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-add">添加</button>
                        </div>
                    </form>
                </div>

                <h2>📋 私密链接列表</h2>
                <div id="privateNoTokenMsg" class="empty-msg hidden">请先配置 GitHub Token 以启用修改功能</div>
                <div id="privateLinksList" class="links-list"></div>
            </div>
        </div>

        <div class="admin-section config-section" id="tokenSection">
            <h3>🔑 GitHub Token 配置</h3>
            <div class="config-row">
                <input type="text" id="githubToken" placeholder="GitHub Personal Access Token">
            </div>
            <button class="btn-add" onclick="saveToken()">保存 Token</button>
            <p class="help-text">
                <strong>注意：</strong>Token 仅用于修改数据，读取无需 Token<br>
                <a href="https://github.com/settings/tokens" target="_blank">生成 Token</a>，仅需勾选 <code>gist</code> 权限
            </p>

            <div id="avatarSection" class="hidden" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                <h3>🖼️ 头像设置</h3>
                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 15px; flex-wrap: wrap;">
                    <img id="avatarPreview" src="" alt="avatar" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(0, 217, 255, 0.3); object-fit: cover;">
                    <div style="flex: 1; min-width: 200px;">
                        <input type="text" id="avatarUrl" placeholder="头像图片 URL" style="width: 100%; margin-bottom: 10px;">
                        <p class="help-text" style="font-size: 0.85rem;">• 输入图片链接，或点击"上传图片"选择本地图片<br>• 上传后会保存到 GitHub，所有人都能看到</p>
                    </div>
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button class="btn-add" onclick="saveAvatar()">保存头像</button>
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="handleAvatarUpload(event)">
                    <label for="avatarUpload" class="btn-add" style="background: linear-gradient(90deg, #00ff88, #00d9ff); color: #1a1a2e; cursor: pointer; padding: 10px 20px;">
                        📷 上传本地图片
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

        let currentTab = 'public';
        let publicLinks = [];
        let privateLinks = [];
        let privateGistId = null;
        let currentAvatar = null;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.toggle('error', isError);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function getToken() {
            return localStorage.getItem(TOKEN_KEY);
        }

        function saveToken() {
            const token = document.getElementById('githubToken').value.trim();
            if (token) {
                localStorage.setItem(TOKEN_KEY, token);
                showToast('Token 已保存！');
                toggleEditMode(true);
                if (currentTab === 'private') {
                    loadPrivateLinks(token);
                }
            } else {
                localStorage.removeItem(TOKEN_KEY);
                showToast('请输入 Token', true);
                toggleEditMode(false);
            }
        }

        function toggleEditMode(hasToken) {
            const editSection = document.getElementById('editSection');
            const linksList = document.getElementById('linksList');
            const noTokenMsg = document.getElementById('noTokenMsg');
            const avatarSection = document.getElementById('avatarSection');
            
            if (hasToken) {
                editSection.classList.remove('hidden');
                noTokenMsg.classList.add('hidden');
                linksList.classList.remove('hidden');
                avatarSection.classList.remove('hidden');
                loadCurrentAvatar();
            } else {
                editSection.classList.add('hidden');
                if (publicLinks.length === 0) {
                    noTokenMsg.classList.remove('hidden');
                    linksList.classList.add('hidden');
                }
                avatarSection.classList.add('hidden');
            }

            const privateEditSection = document.getElementById('privateEditSection');
            const privateLinksList = document.getElementById('privateLinksList');
            const privateNoTokenMsg = document.getElementById('privateNoTokenMsg');
            
            if (hasToken) {
                privateEditSection.classList.remove('hidden');
                privateNoTokenMsg.classList.add('hidden');
                privateLinksList.classList.remove('hidden');
            } else {
                privateEditSection.classList.add('hidden');
                if (privateLinks.length === 0) {
                    privateNoTokenMsg.classList.remove('hidden');
                    privateLinksList.classList.add('hidden');
                }
            }

            renderPublicLinks();
            renderPrivateLinks();
        }

        async function loadCurrentAvatar() {
            try {
                const response = await fetch(`https://gist.githubusercontent.com/zxyclub/${PUBLIC_GIST_ID}/raw/${PUBLIC_FILENAME}?t=${Date.now()}`);
                if (response.ok) {
                    const data = await response.json();
                    if (!Array.isArray(data) && data.avatar) {
                        currentAvatar = data.avatar;
                        document.getElementById('avatarPreview').src = currentAvatar;
                        document.getElementById('avatarUrl').value = currentAvatar;
                    } else {
                        currentAvatar = null;
                        document.getElementById('avatarPreview').src = DEFAULT_AVATAR;
                        document.getElementById('avatarUrl').value = '';
                    }
                }
            } catch (e) {
                document.getElementById('avatarPreview').src = DEFAULT_AVATAR;
            }
        }

        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64 = e.target.result;
                    document.getElementById('avatarUrl').value = base64;
                    document.getElementById('avatarPreview').src = base64;
                    currentAvatar = base64;
                };
                reader.readAsDataURL(file);
            }
        }

        async function saveAvatar() {
            const token = getToken();
            if (!token) {
                showToast('请先保存 Token', true);
                return;
            }

            const avatarUrl = document.getElementById('avatarUrl').value.trim();
            currentAvatar = avatarUrl || null;

            try {
                // 获取当前 Gist 内容
                const gistResponse = await fetch(`https://api.github.com/gists/${PUBLIC_GIST_ID}`, {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Accept': 'application/vnd.github+json'
                    }
                });

                if (!gistResponse.ok) {
                    throw new Error('获取 Gist 失败');
                }

                const gist = await gistResponse.json();
                let currentData = {};
                
                // 解析现有内容
                const currentFile = gist.files[PUBLIC_FILENAME];
                if (currentFile && currentFile.content) {
                    try {
                        currentData = JSON.parse(currentFile.content);
                    } catch (e) {
                        // 如果不是 JSON，忽略
                    }
                }

                // 更新头像
                if (currentAvatar) {
                    currentData.avatar = currentAvatar;
                } else {
                    delete currentData.avatar;
                }

                // 保存回 Gist
                const saveResponse = await fetch(`https://api.github.com/gists/${PUBLIC_GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github+json'
                    },
                    body: JSON.stringify({
                        files: {
                            [PUBLIC_FILENAME]: {
                                content: JSON.stringify(currentData, null, 2)
                            }
                        }
                    })
                });

                if (!saveResponse.ok) {
                    const err = await saveResponse.json();
                    throw new Error(err.message || '保存失败');
                }

                showToast('头像保存成功！');
            } catch (error) {
                showToast('保存失败: ' + error.message, true);
                console.error(error);
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'public') {
                document.getElementById('publicSection').classList.remove('hidden');
                document.getElementById('privateSection').classList.add('hidden');
            } else {
                document.getElementById('publicSection').classList.add('hidden');
                document.getElementById('privateSection').classList.remove('hidden');
                const token = getToken();
                if (token && privateLinks.length === 0) {
                    loadPrivateLinks(token);
                }
            }
        }

        function loadToken() {
            const token = getToken();
            if (token) {
                document.getElementById('githubToken').value = token;
            }
            toggleEditMode(!!token);
        }

        async function fetchPublicLinks() {
            try {
                const response = await fetch(`https://gist.githubusercontent.com/zxyclub/${PUBLIC_GIST_ID}/raw/${PUBLIC_FILENAME}?t=${Date.now()}`);
                if (!response.ok) throw new Error('获取数据失败');
                const data = await response.json();
                // 支持新的对象格式 {avatar, links} 和旧的数组格式
                if (Array.isArray(data)) {
                    publicLinks = data;
                } else {
                    publicLinks = data.links || [];
                }
                renderPublicLinks();
            } catch (error) {
                showToast('加载公开数据失败', true);
                console.error(error);
            }
        }

        async function loadPrivateLinks(token) {
            try {
                const response = await fetch('https://api.github.com/gists', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Accept': 'application/vnd.github+json'
                    }
                });

                if (!response.ok) throw new Error('Token 无效或权限不足');
                
                const gists = await response.json();
                let targetGistId = null;
                for (const gist of gists) {
                    if (gist.files && gist.files[PRIVATE_FILENAME]) {
                        targetGistId = gist.id;
                        break;
                    }
                }

                if (targetGistId) {
                    const gistResponse = await fetch(`https://api.github.com/gists/${targetGistId}`, {
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Accept': 'application/vnd.github+json'
                        }
                    });

                    if (gistResponse.ok) {
                        const targetGist = await gistResponse.json();
                        privateGistId = targetGistId;
                        
                        const privateFile = targetGist.files ? targetGist.files[PRIVATE_FILENAME] : null;
                        if (privateFile && privateFile.content && privateFile.content.trim() !== '') {
                            privateLinks = JSON.parse(privateFile.content);
                            if (!Array.isArray(privateLinks)) privateLinks = [];
                        } else {
                            privateLinks = [];
                        }
                    } else {
                        privateLinks = [];
                    }
                } else {
                    privateLinks = [];
                }
                renderPrivateLinks();
            } catch (error) {
                showToast('加载私密数据失败: ' + error.message, true);
                console.error(error);
            }
        }

        async function savePublicLinks() {
            const token = getToken();
            if (!token) {
                showToast('请先配置 Token', true);
                return;
            }

            try {
                // 获取当前 Gist 内容以保留 avatar
                const gistResponse = await fetch(`https://api.github.com/gists/${PUBLIC_GIST_ID}`, {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Accept': 'application/vnd.github+json'
                    }
                });

                let avatar = null;
                if (gistResponse.ok) {
                    const gist = await gistResponse.json();
                    const currentFile = gist.files[PUBLIC_FILENAME];
                    if (currentFile && currentFile.content) {
                        try {
                            const currentData = JSON.parse(currentFile.content);
                            avatar = currentData.avatar || null;
                        } catch (e) {}
                    }
                }

                // 构建保存的数据
                const saveData = avatar ? { avatar, links: publicLinks } : publicLinks;

                const response = await fetch(`https://api.github.com/gists/${PUBLIC_GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github+json'
                    },
                    body: JSON.stringify({
                        files: {
                            [PUBLIC_FILENAME]: {
                                content: JSON.stringify(saveData, null, 2)
                            }
                        }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || '保存失败');
                }

                showToast('保存成功！');
            } catch (error) {
                showToast('保存失败: ' + error.message, true);
                console.error(error);
            }
        }

        async function savePrivateLinks() {
            const token = getToken();
            if (!token) {
                showToast('请先配置 Token', true);
                return;
            }

            try {
                if (privateGistId) {
                    const response = await fetch(`https://api.github.com/gists/${privateGistId}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github+json'
                        },
                        body: JSON.stringify({
                            files: {
                                [PRIVATE_FILENAME]: {
                                    content: JSON.stringify(privateLinks, null, 2)
                                }
                            }
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.message || '保存失败');
                    }
                } else {
                    const response = await fetch('https://api.github.com/gists', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github+json'
                        },
                        body: JSON.stringify({
                            description: 'ZxyLink Private Links',
                            public: false,
                            files: {
                                [PRIVATE_FILENAME]: {
                                    content: JSON.stringify(privateLinks, null, 2)
                                }
                            }
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.message || '创建失败');
                    }

                    const newGist = await response.json();
                    privateGistId = newGist.id;
                }

                showToast('保存成功！');
            } catch (error) {
                showToast('保存失败: ' + error.message, true);
                console.error(error);
            }
        }

        function renderPublicLinks() {
            const container = document.getElementById('linksList');
            const hasToken = getToken();
            
            if (publicLinks.length === 0) {
                container.innerHTML = hasToken ? '<p class="empty-msg">暂无链接，请添加</p>' : '';
                return;
            }

            container.innerHTML = publicLinks.map((link, index) => {
                return `
                    <div class="link-item" data-index="${index}">
                        <div class="icon-box">${link.icon}</div>
                        <div class="content-box">
                            <div class="info-row">
                                <div>
                                    <div class="title">${link.title}</div>
                                    <div class="group">${link.group || ''}</div>
                                </div>
                                ${hasToken ? `
                                <div class="actions">
                                    <button class="btn-edit" onclick="editPublicLink(${index})">编辑</button>
                                    <button class="btn-delete" onclick="deletePublicLink(${index})">删除</button>
                                </div>
                                ` : ''}
                            </div>
                            <div class="url-row">
                                <span class="url">${link.url}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPrivateLinks() {
            const container = document.getElementById('privateLinksList');
            const hasToken = getToken();
            
            if (privateLinks.length === 0) {
                container.innerHTML = hasToken ? '<p class="empty-msg">暂无私密链接，请添加</p>' : '';
                return;
            }

            container.innerHTML = privateLinks.map((link, index) => {
                return `
                    <div class="link-item" data-index="${index}">
                        <div class="icon-box">${link.icon}</div>
                        <div class="content-box">
                            <div class="info-row">
                                <div>
                                    <div class="title">${link.title}</div>
                                    <div class="group">${link.group || ''}</div>
                                </div>
                                ${hasToken ? `
                                <div class="actions">
                                    <button class="btn-edit" onclick="editPrivateLink(${index})">编辑</button>
                                    <button class="btn-delete" onclick="deletePrivateLink(${index})">删除</button>
                                </div>
                                ` : ''}
                            </div>
                            <div class="url-row">
                                <span class="url">${link.url}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatUrl(url) {
            if (!url) return '';
            url = url.trim();
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }
            return url;
        }

        document.getElementById('addForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newLink = {
                icon: document.getElementById('newIcon').value || '🌐',
                title: document.getElementById('newTitle').value,
                url: formatUrl(document.getElementById('newUrl').value),
                group: document.getElementById('newGroup').value
            };

            publicLinks.push(newLink);
            await savePublicLinks();
            renderPublicLinks();

            document.getElementById('addForm').reset();
            document.getElementById('newIcon').value = '🌐';
        });

        window.editPublicLink = function(index) {
            const link = publicLinks[index];
            const item = document.querySelector(`#publicSection [data-index="${index}"]`);

            item.className = 'link-item';
            item.innerHTML = `
                <div class="edit-item">
                    <div class="edit-row">
                        <input type="text" value="${link.icon}" style="width:60px;text-align:center" id="editIcon">
                        <input type="text" value="${link.title}" id="editTitle" placeholder="网站名称">
                        <input  value="${link.url}" id="editUrl" placeholder="链接">
                        <input type="text" value="${link.group || ''}" id="editGroup" placeholder="分组">
                    </div>
                    <div class="edit-actions">
                        <button class="btn-save" onclick="savePublicEdit(${index})">保存</button>
                        <button class="btn-cancel" onclick="renderPublicLinks()">取消</button>
                    </div>
                </div>
            `;
            document.getElementById('editTitle').focus();
        };

        window.savePublicEdit = async function(index) {
            publicLinks[index] = {
                icon: document.getElementById('editIcon').value || '🌐',
                title: document.getElementById('editTitle').value,
                url: formatUrl(document.getElementById('editUrl').value),
                group: document.getElementById('editGroup').value
            };
            await savePublicLinks();
            renderPublicLinks();
        };

        window.deletePublicLink = async function(index) {
            if (confirm('确定要删除这个链接吗？')) {
                publicLinks.splice(index, 1);
                await savePublicLinks();
                renderPublicLinks();
            }
        };

        document.getElementById('privateAddForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newLink = {
                icon: document.getElementById('newPrivateIcon').value || '🌐',
                title: document.getElementById('newPrivateTitle').value,
                url: formatUrl(document.getElementById('newPrivateUrl').value),
                group: document.getElementById('newPrivateGroup').value
            };

            privateLinks.push(newLink);
            await savePrivateLinks();
            renderPrivateLinks();

            document.getElementById('privateAddForm').reset();
            document.getElementById('newPrivateIcon').value = '🌐';
        });

        window.editPrivateLink = function(index) {
            const link = privateLinks[index];
            const item = document.querySelector(`#privateSection [data-index="${index}"]`);

            item.className = 'link-item';
            item.innerHTML = `
                <div class="edit-item">
                    <div class="edit-row">
                        <input type="text" value="${link.icon}" style="width:60px;text-align:center" id="editPrivateIcon">
                        <input type="text" value="${link.title}" id="editPrivateTitle" placeholder="网站名称">
                        <input type="text" value="${link.url}" id="editPrivateUrl" placeholder="链接">
                        <input type="text" value="${link.group || ''}" id="editPrivateGroup" placeholder="分组">
                    </div>
                    <div class="edit-actions">
                        <button class="btn-save" onclick="savePrivateEdit(${index})">保存</button>
                        <button class="btn-cancel" onclick="renderPrivateLinks()">取消</button>
                    </div>
                </div>
            `;
            document.getElementById('editPrivateTitle').focus();
        };

        window.savePrivateEdit = async function(index) {
            privateLinks[index] = {
                icon: document.getElementById('editPrivateIcon').value || '🌐',
                title: document.getElementById('editPrivateTitle').value,
                url: formatUrl(document.getElementById('editPrivateUrl').value),
                group: document.getElementById('editPrivateGroup').value
            };
            await savePrivateLinks();
            renderPrivateLinks();
        };

        window.deletePrivateLink = async function(index) {
            if (confirm('确定要删除这个链接吗？')) {
                privateLinks.splice(index, 1);
                await savePrivateLinks();
                renderPrivateLinks();
            }
        };

        loadToken();
        fetchPublicLinks();
    </script>
</body>
</html>

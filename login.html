<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 导航页管理</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
        }

        .login-container h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #888;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .loading-msg {
            color: #888;
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #00d9ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 管理登录</h1>
        <p id="loadingMsg" class="loading-msg">验证中...</p>
        <p id="errorMsg" class="error-msg">账号或密码错误</p>
        <form id="loginForm" style="display: none;">
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
        <div class="back-link">
            <a href="index.html">返回主页</a>
        </div>
    </div>

    <script>
        // Gist 配置（硬编码）
        const GIST_ID = 'd12a422a770678dcbb46b8f8050ad2c6';

        let config = null;

        // 页面加载时获取配置
        async function loadConfig() {
            try {
                // 直接访问公开 Gist raw 文件
                const response = await fetch(`https://gist.githubusercontent.com/zxyclub/${GIST_ID}/raw/config.json`);

                if (!response.ok) throw new Error('获取配置失败');

                config = await response.json();

                // 显示登录表单
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('loadingMsg').style.display = 'none';
            } catch (error) {
                console.error(error);
                document.getElementById('loadingMsg').textContent = '配置加载失败，请刷新重试';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!config) {
                document.getElementById('errorMsg').textContent = '配置加载失败，请刷新重试';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === config.username && pass === config.password) {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });

        loadConfig();
    </script>
</body>
</html>
